<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIyanx | Digital Space</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f8f9fb;
            color: #1a1a2e;
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ==================== 细微纹理 ==================== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(99,102,241,0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(139,92,246,0.03) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* ==================== 网格装饰 ==================== */
        .grid-dots {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, #d1d5db 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        /* ==================== 主容器 ==================== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            width: 100%;
            padding: 40px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }

        /* ==================== 顶部：头像 + 名称 ==================== */
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #1a1a2e;
            line-height: 1.2;
        }

        .name-area .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #6b7280;
            letter-spacing: 1px;
        }

        /* ==================== 主体布局：终端 + 卡片 ==================== */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            width: 100%;
            align-items: stretch;
        }

        /* ==================== 终端 ==================== */
        .terminal {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 20px 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.9;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        .terminal-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-shrink: 0;
        }

        .terminal-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .terminal-dots span:nth-child(1) { background: #ef4444; }
        .terminal-dots span:nth-child(2) { background: #f59e0b; }
        .terminal-dots span:nth-child(3) { background: #10b981; }

        .terminal-body {
            flex: 1;
            color: #374151;
        }

        .terminal-body .prompt {
            color: #10b981;
        }

        .terminal-body .cmd {
            color: #1a1a2e;
            font-weight: 500;
        }

        .terminal-body .out {
            color: #6366f1;
        }

        .cursor-blink {
            display: inline-block;
            width: 7px;
            height: 15px;
            background: #6366f1;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ==================== 卡片列表 ==================== */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px 22px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            position: relative;
        }

        .card:hover {
            border-color: #6366f1;
            box-shadow: 0 4px 20px rgba(99,102,241,0.08);
            transform: translateY(-2px);
        }

        .card:active {
            transform: translateY(0);
        }

        .card-icon {
            font-size: 24px;
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            background: #f3f4f6;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #1a1a2e;
        }

        .card-desc {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .card-arrow {
            color: #d1d5db;
            font-size: 18px;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .card:hover .card-arrow {
            transform: translateX(4px);
            color: #6366f1;
        }

        /* ==================== 底部 ==================== */
        .footer {
            display: flex;
            justify-content: center;
            gap: 24px;
            padding-top: 8px;
        }

        .footer a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #9ca3af;
            text-decoration: none;
            transition: color 0.2s ease;
            letter-spacing: 0.5px;
        }

        .footer a:hover {
            color: #6366f1;
        }

        .footer .sep {
            color: #e5e7eb;
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 700px) {
            body { overflow-y: auto; align-items: flex-start; padding: 20px 0; }
            .container { padding: 20px 16px; gap: 24px; }
            .main-grid { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .name-area h1 { font-size: 22px; }
            .terminal { min-height: 160px; font-size: 12px; }
        }

        @media (max-width: 480px) {
            .container { padding: 16px 12px; }
            .card { padding: 14px 16px; }
            .card-title { font-size: 12px; }
            .card-desc { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="grid-dots"></div>

    <div class="container">
        <!-- 头像 + 名称 -->
        <div class="header">
            <div class="avatar">
                <img src="img/avatar.jpg" alt="MIyanx">
            </div>
            <div class="name-area">
                <h1>MIyanx</h1>
                <div class="tagline">// developer &amp; tech blogger</div>
            </div>
        </div>

        <!-- 终端 + 卡片 -->
        <div class="main-grid">
            <div class="terminal">
                <div class="terminal-dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="terminal-body" id="terminal"></div>
            </div>

            <div class="cards">
                <a href="https://cxy1984.github.io/ai-blog/" target="_blank" class="card">
                    <span class="card-icon">📝</span>
                    <div class="card-body">
                        <div class="card-title">TECH BLOG</div>
                        <div class="card-desc">技术笔记 · Java · MySQL · Spring</div>
                    </div>
                    <span class="card-arrow">→</span>
                </a>
                <a href="https://github.com/cxy1984" target="_blank" class="card">
                    <span class="card-icon">⚡</span>
                    <div class="card-body">
                        <div class="card-title">GITHUB</div>
                        <div class="card-desc">开源项目 · 代码仓库</div>
                    </div>
                    <span class="card-arrow">→</span>
                </a>
                <div class="card" style="opacity:0.7;">
                    <span class="card-icon">🔮</span>
                    <div class="card-body">
                        <div class="card-title">MORE</div>
                        <div class="card-desc">更多项目即将到来</div>
                    </div>
                    <span class="card-arrow">→</span>
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <a href="https://github.com/cxy1984" target="_blank">GitHub</a>
            <span class="sep">/</span>
            <a href="https://cxy1984.github.io/ai-blog/" target="_blank">Blog</a>
        </div>
    </div>

    <script>
        // ==================== 打字机 ====================
        (function() {
            const el = document.getElementById('terminal');
            const lines = [
                { t: '> ', c: 'prompt' },
                { t: 'whoami', c: 'cmd' },
                { br: true },
                { t: '  MIyanx', c: 'out' },
                { br: true },
                { t: '> ', c: 'prompt' },
                { t: 'cat /etc/motd', c: 'cmd' },
                { br: true },
                { t: '  欢迎来到我的数字空间 ✦', c: 'out' },
                { br: true },
                { t: '> ', c: 'prompt' },
                { t: 'ls projects/', c: 'cmd' },
                { br: true },
                { t: '  ai-blog/  auction/  ...', c: 'out' },
                { br: true },
                { t: '> ', c: 'prompt' },
            ];

            let buf = '', idx = 0;

            function tick() {
                if (idx >= lines.length) {
                    el.innerHTML = buf + '<span class="cursor-blink"></span>';
                    return;
                }
                const seg = lines[idx];
                if (seg.br) { buf += '<br>'; idx++; setTimeout(tick, 50); return; }
                if (!seg._s) { seg._s = true; seg._i = 0; buf += `<span class="${seg.c}">`; }
                if (seg._i < seg.t.length) {
                    el.innerHTML = buf + seg.t[seg._i] + '<span class="cursor-blink"></span>';
                    seg._i++;
                    setTimeout(tick, seg.c === 'prompt' ? 50 : (20 + Math.random() * 30));
                } else {
                    buf += seg.t + '</span>';
                    idx++;
                    setTimeout(tick, seg.c === 'cmd' ? 250 : 60);
                }
            }
            setTimeout(tick, 500);
        })();
    </script>
</body>
</html>
