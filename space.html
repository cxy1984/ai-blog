            const [loaded, setLoaded] = useState(false);

            // Timeout: if video doesn't load in 8s, show fallback
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (!loaded) setErrored(true);
                }, 8000);
                return () => clearTimeout(timer);
            }, [loaded]);

            const fadeTo = useCallback((target, duration) => {
                if (rAFRef.current) cancelAnimationFrame(rAFRef.current);
                const v = videoRef.current;
                if (!v) return;
                const start = performance.now();
                const from = parseFloat(v.style.opacity) || 0;
                const diff = target - from;

                function tick(now) {
                    const elapsed = now - start;
                    const t = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - t, 3);
                    if (v) v.style.opacity = from + diff * eased;
                    if (t < 1) rAFRef.current = requestAnimationFrame(tick);
                }
                rAFRef.current = requestAnimationFrame(tick);
            }, []);

            useEffect(() => {
                const v = videoRef.current;
                if (!v) return;

                const onLoaded = () => {
                    setLoaded(true);
                    v.style.opacity = '0';
                    v.play().catch(() => {});
                    fadeTo(1, FADE_MS);
                };

                const onError = () => {
                    setErrored(true);
                };

                const onTimeUpdate = () => {
                    if (!fadingOutRef.current && v.duration > 0 && v.duration - v.currentTime <= FADE_OUT_LEAD && v.duration - v.currentTime > 0) {
                        fadingOutRef.current = true;
                        fadeTo(0, FADE_MS);
                    }
                };

                const onEnded = () => {
                    v.style.opacity = '0';
                    setTimeout(() => {
                        v.currentTime = 0;
                        v.play().catch(() => {});
                        fadingOutRef.current = false;
                        fadeTo(1, FADE_MS);
                    }, 100);
                };

                v.addEventListener('loadeddata', onLoaded);
                v.addEventListener('error', onError);
                v.addEventListener('timeupdate', onTimeUpdate);
                v.addEventListener('ended', onEnded);

                // Check if video already loaded
                if (v.readyState >= 3) { setLoaded(true); onLoaded(); }

                return () => {

                    v.removeEventListener('error', onError);
                    v.removeEventListener('timeupdate', onTimeUpdate);
                    v.removeEventListener('ended', onEnded);
                };

                return () => obs.disconnect();
