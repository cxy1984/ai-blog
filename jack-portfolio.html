                        text: "With more than five years of experience in design, i focus on branding, web design, and user experience, i truly enjoy working with businesses that aim to stand out and present their best image. Let's build something incredible together!"
                    }),
                    h('div', { className: 'mt-16 sm:mt-20 md:mt-24' }, h(ContactButton, null))
                )
            );
        };

        var ServicesSection = function() {
            var services = [
                { num: '01', name: '3D Modeling', desc: 'Creation of detailed objects, characters, or environments tailored to specific client needs, ideal for games, products, and visualizations.' },
                { num: '02', name: 'Rendering', desc: 'High-quality, photorealistic renders that showcase designs with custom lighting, textures, and materials to bring concepts to life.' },
                { num: '03', name: 'Motion Design', desc: 'Dynamic animations and motion graphics that add energy and storytelling to brands, products, and digital experiences.' },
                { num: '04', name: 'Branding', desc: 'Crafting cohesive visual identities \u2014 from logos to full brand systems \u2014 that communicate a clear and memorable presence.' },
                { num: '05', name: 'Web Design', desc: 'Designing clean, modern, and conversion-focused websites with attention to layout, typography, and user experience.' }
            ];
            return h('section', { className: 'bg-white rounded-t-[40px] sm:rounded-t-[50px] md:rounded-t-[60px] px-5 sm:px-8 md:px-10 py-20 sm:py-24 md:py-32' },
                h('h2', { className: 'text-[#0C0C0C] font-black uppercase text-center text-[clamp(3rem,12vw,160px)] mb-16 sm:mb-20 md:mb-28' }, 'Services'),
                h('div', { className: 'max-w-5xl mx-auto' },
                    services.map(function(s, i) {
                        return h('div', {
                            key: i, className: 'flex items-start gap-4 sm:gap-6 py-8 sm:py-10 md:py-12',
                            style: { borderBottom: i < services.length - 1 ? '1px solid rgba(12,12,12,0.15)' : 'none' }
                        },
                            h('span', { className: 'font-black text-[clamp(3rem,10vw,140px)] text-[#0C0C0C] leading-none flex-shrink-0' }, s.num),
                            h('div', { className: 'flex flex-col' },
                                h('h3', { className: 'font-medium uppercase text-[clamp(1rem,2.2vw,2.1rem)] text-[#0C0C0C]' }, s.name),
                                h('p', { className: 'font-light leading-relaxed max-w-2xl text-[clamp(0.85rem,1.6vw,1.25rem)] text-[#0C0C0C]', style: { opacity: 0.6 } }, s.desc)
                            )
                        );
                    })
                )
            );
        };

        var ProjectsSection = function() {
            return h('section', { className: 'bg-[#0C0C0C] rounded-t-[40px] sm:rounded-t-[50px] md:rounded-t-[60px] -mt-10 sm:-mt-12 md:-mt-14 z-10 relative px-5 sm:px-8 md:px-10 pt-20 sm:pt-28 md:pt-32 pb-32' },
                h('h2', { className: 'hero-heading font-black uppercase text-center text-[clamp(3rem,12vw,160px)] mb-16' }, 'Project'),
                h('div', { className: 'max-w-6xl mx-auto' },
                    PROJECTS.map(function(p, i) {
                        return h('div', {
                            key: i, className: 'h-[85vh] flex items-start justify-center',
                            style: { top: i * 28 + 'px' }
                        }, h(ProjectCard, { project: p, index: i }));
                    })
                )
            );
        };

        // ─── App ───
        var App = function() {
            return h('div', { style: { overflowX: 'clip' } },
                h(HeroSection, null),
                h(MarqueeSection, null),
                h(AboutSection, null),
                h(ServicesSection, null),
                h(ProjectsSection, null)
            );
        };

        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(React.StrictMode, null, h(App, null)));
    </script>
</body>
</html>
