    <script>
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // Back to top button
            const backToTopButton = document.getElementById('backToTop');
            
            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    backToTopButton.classList.add('visible');
                } else {
                    backToTopButton.classList.remove('visible');
                }
            });
            
            backToTopButton.addEventListener('click', (e) => {
                e.preventDefault();
                window.scrollTo({top: 0, behavior: 'smooth'});
            });

            updateStats();
            console.log('文本处理工具已加载');
        });

        // 更新字数统计
        function updateStats() {
            const text = document.getElementById('inputText').value;
            
            // 基本统计
            document.getElementById('charCount').textContent = text.length;
            document.getElementById('charCountNoSpace').textContent = text.replace(/\s/g, '').length;
            document.getElementById('byteCount').textContent = new Blob([text]).size;
            document.getElementById('lineCount').textContent = text.split('\n').length;
            
            // 段落数（以空行分隔）
            const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            document.getElementById('paragraphCount').textContent = paragraphs.length;
            
            // 单词数（以空格分隔）
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            document.getElementById('wordCount').textContent = words.length;
        }

        // 大小写转换
        function convertCase(type) {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;
            
            switch(type) {
                case 'upper':
                    text = text.toUpperCase();
                    break;
                case 'lower':
                    text = text.toLowerCase();
                    break;
                case 'capitalize':
                    text = text.replace(/\b\w/g, l => l.toUpperCase());
                    break;
                case 'title':
                    text = text.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
                    break;
                case 'swap':
                    text = text.split('').map(c => 
                        c === c.toUpperCase() && c !== c.toLowerCase() ? 
                        c.toLowerCase() : 
                        c.toUpperCase()
                    ).join('');
                    break;
            }
            
            textArea.value = text;
            updateStats();
            showResult('大小写转换完成！');
        }

        // 文本格式化
        function formatText(type) {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;
            
            switch(type) {
                case 'trim':
                    text = text.trim();
                    break;
                case 'removeExtraSpaces':
                    text = text.replace(/\s+/g, ' ').trim();
                    break;
                case 'removeExtraLines':
                    text = text.replace(/\n\s*\n/g, '\n').trim();
                    break;
                case 'removeEmptyLines':
                    text = text.split('\n').filter(line => line.trim().length > 0).join('\n');
                    break;
                case 'reverse':
                    text = text.split('').reverse().join('');
                    break;
                case 'sortLines':
                    text = text.split('\n').sort().join('\n');
                    break;
                case 'uniqueLines':
                    text = [...new Set(text.split('\n'))].join('\n');
                    break;
                case 'reverseLines':
                    text = text.split('\n').reverse().join('\n');
                    break;
                case 'removeNumbers':
                    text = text.replace(/\d+/g, '');
                    break;
                case 'removeSpecial':
                    text = text.replace(/[^\w\s]/g, '');
                    break;
            }
            
            textArea.value = text;
            updateStats();
            showResult('文本格式化完成！');
        }

        // 文本处理
        function processText(type) {
            const textArea = document.getElementById('inputText');
            const text = textArea.value;
            
            switch(type) {
                case 'countChars':
                    const charCount = {};
                    for (let char of text) {
                        charCount[char] = (charCount[char] || 0) + 1;
                    }
                    const result = Object.entries(charCount)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 20)
                        .map(([char, count]) => `${char}: ${count}`)
                        .join('\n');
                    showResult('字符频率统计：\n' + result);
                    break;
                case 'extractNumbers':
                    const numbers = text.match(/\d+/g);
                    if (numbers) {
                        textArea.value = numbers.join('\n');
                        updateStats();
                        showResult('数字提取完成！');
                    } else {
                        showResult('未找到数字');
                    }
                    break;
                case 'extractWords':
                    const words = text.toLowerCase().match(/\b\w+\b/g) || [];
                    textArea.value = [...new Set(words)].join('\n');
                    updateStats();
                    showResult('单词提取完成！');
                    break;
                case 'addLineNumbers':
                    const lines = text.split('\n');
                    const numberedLines = lines.map((line, index) => 
                        `${index + 1}. ${line}`
                    );
                    textArea.value = numberedLines.join('\n');
                    updateStats();
                    showResult('行号添加完成！');
                    break;
                case 'wrapLines':
                    textArea.value = text.split('\n').join(' ');
                    updateStats();
                    showResult('换行处理完成！');
                    break;
            }
        }

        // 保存到文件
        function saveToFile() {
            const content = document.getElementById('inputText').value;
            let filename = document.getElementById('fileName').value.trim();
            
            if (!content) {
                alert('请输入要保存的文本内容');
                return;
            }
            
            // 如果文件名为空，使用当前时间
            if (!filename) {
                const now = new Date();
                const timestamp = now.getFullYear() + '-' + 
                    String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                    String(now.getDate()).padStart(2, '0') + '_' +
                    String(now.getHours()).padStart(2, '0') + '-' +
                    String(now.getMinutes()).padStart(2, '0') + '-' +
                    String(now.getSeconds()).padStart(2, '0');
                filename = `text_${timestamp}.txt`;
            }
            
            // 确保文件有扩展名
            if (!filename.includes('.')) {
                filename += '.txt';
            }
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            
            showResult(`文件 "${filename}" 下载成功！`);
        }

        // 复制到剪贴板
        function copyToClipboard() {
            const content = document.getElementById('inputText').value;
            
            if (!content) {
                showResult('没有内容可复制');
                return;
            }
            
            navigator.clipboard.writeText(content).then(() => {
                showResult('内容已复制到剪贴板！');
            }).catch(() => {
                showResult('复制失败，请手动复制');
            });
        }

        // 清空所有
        function clearAll() {
            if (confirm('确定要清空所有内容吗？')) {
                document.getElementById('fileName').value = '';
                document.getElementById('inputText').value = '';
                updateStats();
                showResult('已清空所有内容');
            }
        }

        // 转义处理
        function escapeText(type) {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;

            switch(type) {
                case 'html':
                    text = text.replace(/[&<>"']/g, function(match) {
                        const escapeMap = {
                            '&': '&amp;',
                            '<': '&lt;',
                            '>': '&gt;',
                            '"': '&quot;',
                            "'": '&#39;'
                        };
                        return escapeMap[match];
                    });
                    break;
                case 'url':
                    text = encodeURIComponent(text);
                    break;
                case 'json':
                    text = text.replace(/["\\]/g, function(match) {
                        return '\\' + match;
                    }).replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
                    break;
                case 'regex':
                    text = text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    break;
            }

            textArea.value = text;
            updateStats();
            showResult(`${type.toUpperCase()}转义完成！`);
        }

        // 去转义处理
        function unescapeText(type) {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;

            switch(type) {
                case 'html':
                    text = text.replace(/&amp;/g, '&')
                              .replace(/&lt;/g, '<')
                              .replace(/&gt;/g, '>')
                              .replace(/&quot;/g, '"')
                              .replace(/&#39;/g, "'")
                              .replace(/&#x27;/g, "'")
                              .replace(/&#x2F;/g, "/");
                    break;
                case 'url':
                    try {
                        text = decodeURIComponent(text);
                    } catch (e) {
                        showResult('URL解码失败，请检查格式');
                        return;
                    }
                    break;
                case 'json':
                    try {
                        // 先将JSON字符串转义，然后解析再重新获取
                        const parsed = JSON.parse('"' + text + '"');
                        text = parsed;
                    } catch (e) {
                        // 如果JSON解析失败，使用基本的去转义
                        text = text.replace(/\\n/g, '\n')
                                  .replace(/\\r/g, '\r')
                                  .replace(/\\t/g, '\t')
                                  .replace(/\\"/g, '"')
                                  .replace(/\\\\/g, '\\');
                    }
                    break;
                case 'common':
                    // 常见转义字符还原
                    text = text.replace(/\\n/g, '\n')
                              .replace(/\\r/g, '\r')
                              .replace(/\\t/g, '\t')
                              .replace(/\\"/g, '"')
                              .replace(/\\'/g, "'")
                              .replace(/\\\\/g, '\\')
                              .replace(/\\x([0-9A-Fa-f]{2})/g, function(match, hex) {
                                  return String.fromCharCode(parseInt(hex, 16));
                              })
                              .replace(/\\u([0-9A-Fa-f]{4})/g, function(match, hex) {
                                  return String.fromCharCode(parseInt(hex, 16));
                              });
                    break;
            }

            textArea.value = text;
            updateStats();
            showResult(`${type.toUpperCase()}去转义完成！`);
        }

        // 显示结果
        function showResult(message) {
            const resultBox = document.getElementById('actionResult');
            resultBox.textContent = message;
            resultBox.classList.add('show');

            // 3秒后自动隐藏结果
            setTimeout(() => {
                resultBox.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
