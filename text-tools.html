    <script>
        // 鍒濆鍖?
        document.addEventListener('DOMContentLoaded', function() {
            // Back to top button
            const backToTopButton = document.getElementById('backToTop');
            
            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    backToTopButton.classList.add('visible');
                } else {
                    backToTopButton.classList.remove('visible');
                }
            });
            
            backToTopButton.addEventListener('click', (e) => {
                e.preventDefault();
                window.scrollTo({top: 0, behavior: 'smooth'});
            });

            updateStats();
            console.log('鏂囨湰澶勭悊宸ュ叿宸插姞杞?);
        });

        // 鏇存柊瀛楁暟缁熻
        function updateStats() {
            const text = document.getElementById('inputText').value;
            
            // 鍩烘湰缁熻
            document.getElementById('charCount').textContent = text.length;
            document.getElementById('charCountNoSpace').textContent = text.replace(/\s/g, '').length;
            document.getElementById('byteCount').textContent = new Blob([text]).size;
            document.getElementById('lineCount').textContent = text.split('\n').length;
            
            // 娈佃惤鏁帮紙浠ョ┖琛屽垎闅旓級
            const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            document.getElementById('paragraphCount').textContent = paragraphs.length;
            
            // 鍗曡瘝鏁帮紙浠ョ┖鏍煎垎闅旓級
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            document.getElementById('wordCount').textContent = words.length;
        }

        // 澶у皬鍐欒浆鎹?
        function convertCase(type) {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;
            
            switch(type) {
                case 'upper':
                    text = text.toUpperCase();
                    break;
                case 'lower':
                    text = text.toLowerCase();
                    break;
                case 'capitalize':
                    text = text.replace(/\b\w/g, l => l.toUpperCase());
                    break;
                case 'title':
                    text = text.toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
                    break;
                case 'swap':
                    text = text.split('').map(c => 
                        c === c.toUpperCase() && c !== c.toLowerCase() ? 
                        c.toLowerCase() : 
                        c.toUpperCase()
                    ).join('');
                    break;
            }
            
            textArea.value = text;
            updateStats();
            showResult('澶у皬鍐欒浆鎹㈠畬鎴愶紒');
        }

        // 鏂囨湰鏍煎紡鍖?
        function formatText(type) {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;
            
            switch(type) {
                case 'trim':
                    text = text.trim();
                    break;
                case 'removeExtraSpaces':
                    text = text.replace(/\s+/g, ' ').trim();
                    break;
                case 'removeExtraLines':
                    text = text.replace(/\n\s*\n/g, '\n').trim();
                    break;
                case 'removeEmptyLines':
                    text = text.split('\n').filter(line => line.trim().length > 0).join('\n');
                    break;
                case 'reverse':
                    text = text.split('').reverse().join('');
                    break;
                case 'sortLines':
                    text = text.split('\n').sort().join('\n');
                    break;
                case 'uniqueLines':
                    text = [...new Set(text.split('\n'))].join('\n');
                    break;
                case 'reverseLines':
                    text = text.split('\n').reverse().join('\n');
                    break;
                case 'removeNumbers':
                    text = text.replace(/\d+/g, '');
                    break;
                case 'removeSpecial':
                    text = text.replace(/[^\w\s]/g, '');
                    break;
            }
            
            textArea.value = text;
            updateStats();
            showResult('鏂囨湰鏍煎紡鍖栧畬鎴愶紒');
        }

        // 鏂囨湰澶勭悊
        function processText(type) {
            const textArea = document.getElementById('inputText');
            const text = textArea.value;
            
            switch(type) {
                case 'countChars':
                    const charCount = {};
                    for (let char of text) {
                        charCount[char] = (charCount[char] || 0) + 1;
                    }
                    const result = Object.entries(charCount)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 20)
                        .map(([char, count]) => `${char}: ${count}`)
                        .join('\n');
                    showResult('瀛楃棰戠巼缁熻锛歕n' + result);
                    break;
                case 'extractNumbers':
                    const numbers = text.match(/\d+/g);
                    if (numbers) {
                        textArea.value = numbers.join('\n');
                        updateStats();
                        showResult('鏁板瓧鎻愬彇瀹屾垚锛?);
                    } else {
                        showResult('鏈壘鍒版暟瀛?);
                    }
                    break;
                case 'extractWords':
                    const words = text.toLowerCase().match(/\b\w+\b/g) || [];
                    textArea.value = [...new Set(words)].join('\n');
                    updateStats();
                    showResult('鍗曡瘝鎻愬彇瀹屾垚锛?);
                    break;
                case 'addLineNumbers':
                    const lines = text.split('\n');
                    const numberedLines = lines.map((line, index) => 
                        `${index + 1}. ${line}`
                    );
                    textArea.value = numberedLines.join('\n');
                    updateStats();
                    showResult('琛屽彿娣诲姞瀹屾垚锛?);
                    break;
                case 'wrapLines':
                    textArea.value = text.split('\n').join(' ');
                    updateStats();
                    showResult('鎹㈣澶勭悊瀹屾垚锛?);
                    break;
            }
        }

        // 淇濆瓨鍒版枃浠?
        function saveToFile() {
            const content = document.getElementById('inputText').value;
            let filename = document.getElementById('fileName').value.trim();
            
            if (!content) {
                alert('璇疯緭鍏ヨ淇濆瓨鐨勬枃鏈唴瀹?);
                return;
            }
            
            // 濡傛灉鏂囦欢鍚嶄负绌猴紝浣跨敤褰撳墠鏃堕棿
            if (!filename) {
                const now = new Date();
                const timestamp = now.getFullYear() + '-' + 
                    String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                    String(now.getDate()).padStart(2, '0') + '_' +
                    String(now.getHours()).padStart(2, '0') + '-' +
                    String(now.getMinutes()).padStart(2, '0') + '-' +
                    String(now.getSeconds()).padStart(2, '0');
                filename = `text_${timestamp}.txt`;
            }
            
            // 纭繚鏂囦欢鏈夋墿灞曞悕
            if (!filename.includes('.')) {
                filename += '.txt';
            }
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            
            showResult(`鏂囦欢 "${filename}" 涓嬭浇鎴愬姛锛乣);
        }

        // 澶嶅埗鍒板壀璐存澘
        function copyToClipboard() {
            const content = document.getElementById('inputText').value;
            
            if (!content) {
                showResult('娌℃湁鍐呭鍙鍒?);
                return;
            }
            
            navigator.clipboard.writeText(content).then(() => {
                showResult('鍐呭宸插鍒跺埌鍓创鏉匡紒');
            }).catch(() => {
                showResult('澶嶅埗澶辫触锛岃鎵嬪姩澶嶅埗');
            });
        }

        // 娓呯┖鎵€鏈?
        function clearAll() {
            if (confirm('纭畾瑕佹竻绌烘墍鏈夊唴瀹瑰悧锛?)) {
                document.getElementById('fileName').value = '';
                document.getElementById('inputText').value = '';
                updateStats();
                showResult('宸叉竻绌烘墍鏈夊唴瀹?);
            }
        }

        // 杞箟澶勭悊
        function escapeText(type) {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;

            switch(type) {
                case 'html':
                    text = text.replace(/[&<>"']/g, function(match) {
                        const escapeMap = {
                            '&': '&amp;',
                            '<': '&lt;',
                            '>': '&gt;',
                            '"': '&quot;',
                            "'": '&#39;'
                        };
                        return escapeMap[match];
                    });
                    break;
                case 'url':
                    text = encodeURIComponent(text);
                    break;
                case 'json':
                    text = text.replace(/["\\]/g, function(match) {
                        return '\\' + match;
                    }).replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
                    break;
                case 'regex':
                    text = text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    break;
            }

            textArea.value = text;
            updateStats();
            showResult(`${type.toUpperCase()}杞箟瀹屾垚锛乣);
        }

        // 鍘昏浆涔夊鐞?
        function unescapeText(type) {
            const textArea = document.getElementById('inputText');
            let text = textArea.value;

            switch(type) {
                case 'html':
                    text = text.replace(/&amp;/g, '&')
                              .replace(/&lt;/g, '<')
                              .replace(/&gt;/g, '>')
                              .replace(/&quot;/g, '"')
                              .replace(/&#39;/g, "'")
                              .replace(/&#x27;/g, "'")
                              .replace(/&#x2F;/g, "/");
                    break;
                case 'url':
                    try {
                        text = decodeURIComponent(text);
                    } catch (e) {
                        showResult('URL瑙ｇ爜澶辫触锛岃妫€鏌ユ牸寮?);
                        return;
                    }
                    break;
                case 'json':
                    try {
                        // 鍏堝皢JSON瀛楃涓茶浆涔夛紝鐒跺悗瑙ｆ瀽鍐嶉噸鏂拌幏鍙?
                        const parsed = JSON.parse('"' + text + '"');
                        text = parsed;
                    } catch (e) {
                        // 濡傛灉JSON瑙ｆ瀽澶辫触锛屼娇鐢ㄥ熀鏈殑鍘昏浆涔?
                        text = text.replace(/\\n/g, '\n')
                                  .replace(/\\r/g, '\r')
                                  .replace(/\\t/g, '\t')
                                  .replace(/\\"/g, '"')
                                  .replace(/\\\\/g, '\\');
                    }
                    break;
                case 'common':
                    // 甯歌杞箟瀛楃杩樺師
                    text = text.replace(/\\n/g, '\n')
                              .replace(/\\r/g, '\r')
                              .replace(/\\t/g, '\t')
                              .replace(/\\"/g, '"')
                              .replace(/\\'/g, "'")
                              .replace(/\\\\/g, '\\')
                              .replace(/\\x([0-9A-Fa-f]{2})/g, function(match, hex) {
                                  return String.fromCharCode(parseInt(hex, 16));
                              })
                              .replace(/\\u([0-9A-Fa-f]{4})/g, function(match, hex) {
                                  return String.fromCharCode(parseInt(hex, 16));
                              });
                    break;
            }

            textArea.value = text;
            updateStats();
            showResult(`${type.toUpperCase()}鍘昏浆涔夊畬鎴愶紒`);
        }

        // 鏄剧ず缁撴灉
        function showResult(message) {
            const resultBox = document.getElementById('actionResult');
            resultBox.textContent = message;
            resultBox.classList.add('show');

            // 3绉掑悗鑷姩闅愯棌缁撴灉
            setTimeout(() => {
                resultBox.classList.remove('show');
            }, 3000);
        }
    </script>
